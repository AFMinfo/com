<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفحام للمعلوميات | الروابط الرسمية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');

        :root {
            font-family: 'Cairo', sans-serif;
            color-scheme: dark;
            --bg-dark: #04050a;
            --bg-soft: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.18);
            --text: #ffffff;
            --muted: #c3cad6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            background-image: url('https://j.top4top.io/p_38024bfgu1.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 0;
        }

        .layout {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
        }

        .panel {
            background: rgba(0, 0, 0, 0.68);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-body {
            padding: 48px 22px 56px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .panel-body::-webkit-scrollbar {
            width: 5px;
        }

        .panel-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .panel-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .top-block {
            text-align: center;
        }

        .logo-box {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 1.6px solid rgba(255,255,255,0.24);
            background: rgba(255,255,255,0.04);
            display: grid;
            place-items: center;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .brand-name {
            font-size: 1.9rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: 0.01em;
        }

        .brand-subtitle {
            margin-top: 18px;
            font-size: 1.05rem;
            line-height: 1.8;
        }

        .brand-subtitle .bold-text {
            font-weight: 800;
            color: #ffaa00;
        }

        .brand-subtitle .small-text {
            color: #ffffff;
            font-size: 0.85rem;
        }

        .brand-arrow {
            margin-top: 20px;
            font-size: 1.7rem;
            color: #e60000;
        }

        .link-list {
            margin-top: 34px;
            display: grid;
            gap: 14px;
            padding-bottom: 10px;
        }

        .link-item {
            display: block;
            width: 100%;
            border: 1.6px solid #fff;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.04);
            padding: 18px 22px;
            text-decoration: none;
            color: var(--text);
            transition: transform 0.2s ease, background 0.2s ease;
            font-size: 1.05rem;
            font-weight: 700;
            text-align: center;
        }

        .link-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }

        @media (max-width: 640px) {
            .panel-body {
                padding: 36px 18px 44px;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <section class="panel">
            <div class="panel-body">
                <div class="top-block">
                    <div class="logo-box">
                        <img src="https://fly.linkcdn.cc/upload/2026052007/177926178294487563.png" alt="شعار الفحام للمعلوميات">
                    </div>
                    <h1 class="brand-name">الفحام للمعلوميات</h1>
                    <p class="brand-subtitle"><span class="bold-text">للتقنيات والبرمجيات والتصاميم</span><br><span class="small-text">تابعونا على مواقع التواصل الاجتماعي</span></p>
                    <div class="brand-arrow">🔻</div>
                </div>

                <div class="link-list">
                    <a class="link-item" href="https://youtube.com/@alfahaminfo" target="_blank">YouTube</a>
                    <a class="link-item" href="https://m.facebook.com/alfahaminfo1" target="_blank">Facebook</a>
                    <a class="link-item" href="https://www.instagram.com/alfahaminfo" target="_blank">Instagram</a>
                    <a class="link-item" href="https://www.tiktok.com/@alfaham.info" target="_blank">Tik Tok</a>
                    <a class="link-item" href="http://x.com/alfaham_info" target="_blank">X(Twitter)</a>
                    <a class="link-item" href="https://whatsapp.com/channel/0029VbCa4Nd2P59l7LFa7B3j" target="_blank">WhatSapp</a>
                    <a class="link-item" href="https://t.me/alfahaminfo1" target="_blank">Telegram</a>
                    <a class="link-item" href="https://alfahamstore.apk.com/" target="_blank">Alfaham Store</a>
                    <a class="link-item" href="https://h-80.github.io/alfahamapp/" target="_blank">Alfaham video</a>
                </div>
            </div>
        </section>
        <footer class="footer">@alfahaminfo</footer>
    </div>
</body>
</html>
